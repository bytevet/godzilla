syntax = "proto3";

package godzilla.ir.v1;

option go_package = "godzilla/pkg/ir/v1;ir";

import "proto/common.proto";
import "proto/instruction.proto";

// BasicBlock represents a sequence of instructions with single entry and exit.
message BasicBlock {
  int32 index = 1;
  string comment = 2; // e.g. "entry", "cond.true"
  repeated Instruction instrs = 3;
  repeated int32 preds = 4; // Predecessor block indices
  repeated int32 succs = 5; // Successor block indices
}

// Function represents a function definition.
message Function {
  string name = 1;     // Unique name within the frontend (e.g. main.main)
  string object_name = 2; // Original source name (e.g. main)
  string method_name = 3; // If method, the method name.
  string package_name = 4; // Package path.

  Signature signature = 5;
  Position pos = 6;

  repeated Value params = 7;      // Function parameters
  repeated Value free_vars = 8;   // Captured variables (closure)
  repeated BasicBlock blocks = 9; // Basic blocks forming the function body

  repeated Value locals = 10;     // Local variables (allocs) that might be lifted
  Type parent = 11;               // If method, the receiver type

  bool synthetic = 12; // True if generated by compiler/wrapper

  // Canonical fully-qualified name used by rules to match across languages.
  // Scheme: "<lang>:<module/path>.<Type>.<member>", e.g.
  //   "go:net/http.(*Request).FormValue", "py:flask.request.args.get".
  string canonical_name = 13;
}
