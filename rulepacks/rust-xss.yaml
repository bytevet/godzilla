# Reflected XSS (CWE-79): untrusted input written into an HTML response body
# without escaping. axum's Html wrapper renders its argument as text/html.
rules:
  - id: rust-xss
    languages: [rust]
    severity: high
    cwe: CWE-79
    message: >-
      Untrusted input is rendered into an HTML response without escaping, which
      may allow reflected cross-site scripting (XSS). HTML-escape the value
      before embedding it (e.g. via a templating engine with auto-escaping).
    extend: $_rust-web-sources.yaml
    sinks:
      - "rust:*Html::from"
      - "rust:*Html::new"
      - "rust:axum::response::Html"
    sanitizers:
      - "rust:*escape_html"
      - "rust:*encode_text"
      - "rust:*html_escape*"
    propagators:
      - "rust:format"
      - "rust:*::add"
