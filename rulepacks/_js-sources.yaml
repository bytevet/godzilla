# Shared JS HTTP request-accessor sources (Express/Koa/Fastify/Hapi). Pulled into
# the js-*.yaml rules with `extend: $_js-sources.yaml`.
sources:
  - "js:*req.query*"
  - "js:*req.headers*"
  - "js:*req.cookies*"
  - "js:*req.get"
  - "js:*req.header"
  - "js:*req.params*"
  - "js:*req.body*"
  - "js:*req.originalUrl"
  - "js:*req.path*"
  - "js:*req.url" # exact (no trailing *) so it matches req.url, not req.urlencoded
  - "js:*ctx.query*"
  - "js:*ctx.params*"
  - "js:*ctx.headers*"
  - "js:*ctx.cookies*"
  - "js:*ctx.request*"
  - "js:*request.query*"
  - "js:*request.params*"
  - "js:*request.body*"
  - "js:*request.payload*"
  - "js:*request.headers*"
  - "js:*request.cookies*"
