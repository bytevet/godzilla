# OS command injection (Ruby, CWE-78): untrusted request/CLI input flowing into
# a shell execution. Ruby has many ways to spawn a shell (Kernel#system/exec/`,
# %x, IO.popen, Open3.*), all of which interpret shell metacharacters when given
# a single string.
rules:
  - id: ruby-command-injection
    languages: [ruby]
    severity: critical
    cwe: CWE-78
    message: >-
      Untrusted input (request params, environment, CLI args) flows into a shell
      command execution, which may allow OS command injection. Pass the command
      and its arguments as a list (e.g. system("cmd", arg1, arg2)) so no shell is
      invoked, and validate inputs.
    # Request sources are base-scoped: the frontend synthesizes a source CALL
    # `ruby:<base>.<accessor>` for any accessor read off an opaque request base
    # (a handler parameter or a free framework accessor), so these globs match a
    # whole framework's request object rather than a fixed member list.
    sources:
      - "ruby:params"                # params[:x] / params['x']
      - "ruby:cookies"               # cookies[:x]
      - "ruby:params.*"              # params.fetch(:x) / params.dig(...)
      - "ruby:cookies.*"
      - "ruby:request.*"             # request.<accessor> (Rails/Sinatra/Rack request)
      - "ruby:req.*"                 # conventional `req` request receiver
      - "ruby:*ENV*"                 # environment / CGI variables (secondary source)
    sinks:
      # system/exec/spawn only invoke a shell when given a single command string;
      # pin the command argument (#0) so the safe multi-arg form
      # (system("ls", tainted)) — which never reaches a shell — is not flagged.
      - "ruby:system#0"
      - "ruby:exec#0"
      - "ruby:spawn#0"
      # A backtick / %x / popen literal is always a single shell string, so any
      # tainted part is dangerous (bare = all args).
      - "ruby:%x"                    # backtick / %x{} command literal
      - "ruby:*.popen"
      - "ruby:Open3.*"
    sanitizers:
      - "ruby:Shellwords.escape"
      - "ruby:Shellwords.shellescape"
    propagators:
      - "ruby:*.to_s"
      - "ruby:*.strip"
      - "ruby:*.chomp"
      - "ruby:*.join"
