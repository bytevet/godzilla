# Server-Side Request Forgery: untrusted request input flowing into an
# outbound HTTP request's target URL.
rules:
  - id: js-ssrf
    languages: [javascript]
    # Align with go-ssrf (same CWE-918) so the CI gate treats SSRF
    # identically regardless of source language.
    severity: high
    cwe: CWE-918
    message: >-
      Untrusted request input (query string, route params, or body) flows
      into an outbound HTTP request URL, which may allow server-side request
      forgery (SSRF) to internal or unintended hosts. Validate the
      destination against an allow-list before making the request.
    sources:
      - "js:*req.query*"
      - "js:*req.headers*"
      - "js:*req.cookies*"
      - "js:*req.get"
      - "js:*req.header"
      - "js:*req.params*"
      - "js:*req.body*"
      # More Express request accessors (the URL/path are attacker-influenced).
      - "js:*req.originalUrl"
      - "js:*req.path*"
      # Koa request accessors (ctx.query, ctx.params, ctx.headers, ctx.cookies,
      # ctx.request.body/query).
      - "js:*ctx.query*"
      - "js:*ctx.params*"
      - "js:*ctx.headers*"
      - "js:*ctx.cookies*"
      - "js:*ctx.request*"
      # Fastify / Hapi request accessors (request.query/params/body/payload/
      # headers/cookies) — base-scoped to the framework `request` object. The JS
      # frontend only synthesizes a source for a member read off an OPAQUE base
      # (a handler parameter or a free/global), so an ordinary local object named
      # `request` is not turned into a source.
      - "js:*request.query*"
      - "js:*request.params*"
      - "js:*request.body*"
      - "js:*request.payload*"
      - "js:*request.headers*"
      - "js:*request.cookies*"
    # `*http.get`/`*https.get` cover Node's built-in http/https modules;
    # `*axios*` and `*fetch` are broad so both a bare `fetch(url)`/`axios(url)`
    # call and a method call off either (`axios.get`, `window.fetch`) are
    # caught, mirroring js-command-injection's broad `js:*.exec`.
    sinks:
      - "js:*http.get"
      - "js:*https.get"
      - "js:*axios*"
      - "js:*fetch"
    # No built-in sanitizer neutralizes tainted input for a request URL; the
    # fix is allow-listing the destination host, not escaping.
    sanitizers:
      - "js:encodeURIComponent"
    propagators: []
