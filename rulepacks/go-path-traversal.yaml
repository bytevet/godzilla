# Path traversal (CWE-22): untrusted HTTP/URL input flowing into filesystem
# access without path normalization/containment.
rules:
  - id: go-path-traversal
    languages: [go]
    severity: high
    cwe: CWE-22
    message: >-
      Untrusted input flows into a filesystem path without being cleaned or
      validated, which may allow path traversal (e.g. "../" sequences) to
      read or write files outside the intended directory.
    sources:
      - "go:*net/url*.Get"
      - "go:*net/http.Header*.Get"
      # Synthetic source: the frontend taints an HTTP handler's *http.Request
      # param (converters/go addHTTPRequestSource) so field reads off it
      # (r.URL.Path, r.Form, …) are covered for net/http and any router on it.
      - "go:@net/http.Request"
      # Framework request accessors, receiver-type-scoped so they never collide
      # with a same-named sink (e.g. sql.DB.Query).
      # Gin.
      - "go:*gin-gonic/gin.Context*.Query"
      - "go:*gin-gonic/gin.Context*.DefaultQuery"
      - "go:*gin-gonic/gin.Context*.QueryArray"
      - "go:*gin-gonic/gin.Context*.QueryMap"
      - "go:*gin-gonic/gin.Context*.GetQuery"
      - "go:*gin-gonic/gin.Context*.Param"
      - "go:*gin-gonic/gin.Context*.PostForm"
      - "go:*gin-gonic/gin.Context*.DefaultPostForm"
      - "go:*gin-gonic/gin.Context*.GetHeader"
      # Echo.
      - "go:*labstack/echo*Context*.QueryParam"
      - "go:*labstack/echo*Context*.QueryParams"
      - "go:*labstack/echo*Context*.Param"
      - "go:*labstack/echo*Context*.FormValue"
      - "go:*labstack/echo*Context*.FormParams"
      # Chi.
      - "go:*go-chi/chi*.URLParam"
      # Gorilla mux — path variables.
      - "go:*gorilla/mux.Vars"
      # Macaron / Grafana route params (grafana/pkg/web.Params) — a free-function
      # route accessor like mux.Vars returning untrusted path/query params.
      - "go:*web.Params"
      # Fiber — *fiber.Ctx.
      - "go:*gofiber/fiber*.Ctx*.Query"
      - "go:*gofiber/fiber*.Ctx*.Params"
      - "go:*gofiber/fiber*.Ctx*.FormValue"
      - "go:*gofiber/fiber*.Ctx*.Cookies"
      - "go:*gofiber/fiber*.Ctx*.Get"
      # fasthttp — *fasthttp.RequestCtx.
      - "go:*fasthttp.RequestCtx*.FormValue"
      - "go:*fasthttp.RequestCtx*.UserValue"
    # The path is logical arg 0 for the os/ioutil sinks (os.WriteFile's data/perm
    # args are not injection points). http.ServeFile(w, r, name) serves the file
    # at `name` — the textbook path-traversal sink — with its path at logical arg 2.
    # The synthetic request object also grants request-object provenance, so
    # accessor calls on it are covered even for an unmodeled framework (engine
    # reads this tag instead of a hardcoded source name).
    request_object_sources:
      - "go:@net/http.Request"
    sinks:
      - "go:os.Open*#0"
      - "go:os.ReadFile#0"
      - "go:os.WriteFile#0"
      - "go:os.Create#0"
      - "go:*ioutil.ReadFile#0"
      - "go:*net/http.ServeFile#2"
    # filepath.Base strips the directory component, so it genuinely prevents
    # traversal. filepath.Clean/filepath.Join do NOT contain input to a base
    # directory ("/data" + "../../etc" cleans to "/etc"), so they are propagators.
    sanitizers:
      - "go:*filepath.Base"
    propagators:
      - "go:strings.Join"
      - "go:*filepath.Join"
      - "go:*filepath.Clean"
    # Guard/barrier validator (ENG-9): a containment check that, when it dominates
    # the branch reaching the sink, proves the path was validated and suppresses
    # the finding. filepath.IsLocal (rejects "..", absolute, reserved names) is
    # the canonical barrier: `if !IsLocal(p) { return }; os.Open(p)`.
    validators:
      - "go:*filepath.IsLocal"
