# Path traversal: untrusted HTTP/URL input flowing into filesystem access
# without path normalization/containment.
rules:
  - id: go-path-traversal
    languages: [go]
    severity: high
    cwe: CWE-22
    message: >-
      Untrusted input flows into a filesystem path without being cleaned or
      validated, which may allow path traversal (e.g. "../" sequences) to
      read or write files outside the intended directory.
    sources:
      - "go:*net/url*.Get"
      - "go:*net/http.Header*.Get"
      # Synthetic request-object source: the frontend taints an HTTP handler's
      # *http.Request parameter (converters/go addHTTPRequestSource), so field
      # reads off it (r.URL.Path, r.Form, r.Body, …) — which no method rule can
      # match — are covered for net/http and any router built on it (chi,
      # gorilla/mux, …).
      - "go:@net/http.Request"
      # Web-framework request accessors, receiver-type-scoped so they never
      # collide with a same-named sink (e.g. sql.DB.Query).
      # Gin (github.com/gin-gonic/gin).
      - "go:*gin-gonic/gin.Context*.Query"
      - "go:*gin-gonic/gin.Context*.DefaultQuery"
      - "go:*gin-gonic/gin.Context*.QueryArray"
      - "go:*gin-gonic/gin.Context*.QueryMap"
      - "go:*gin-gonic/gin.Context*.GetQuery"
      - "go:*gin-gonic/gin.Context*.Param"
      - "go:*gin-gonic/gin.Context*.PostForm"
      - "go:*gin-gonic/gin.Context*.DefaultPostForm"
      - "go:*gin-gonic/gin.Context*.GetHeader"
      # Echo (github.com/labstack/echo).
      - "go:*labstack/echo*Context*.QueryParam"
      - "go:*labstack/echo*Context*.QueryParams"
      - "go:*labstack/echo*Context*.Param"
      - "go:*labstack/echo*Context*.FormValue"
      - "go:*labstack/echo*Context*.FormParams"
      # Chi (github.com/go-chi/chi).
      - "go:*go-chi/chi*.URLParam"
      # Gorilla mux (github.com/gorilla/mux) — path variables.
      - "go:*gorilla/mux.Vars"
      # Fiber (github.com/gofiber/fiber) — *fiber.Ctx.
      - "go:*gofiber/fiber*.Ctx*.Query"
      - "go:*gofiber/fiber*.Ctx*.Params"
      - "go:*gofiber/fiber*.Ctx*.FormValue"
      - "go:*gofiber/fiber*.Ctx*.Cookies"
      - "go:*gofiber/fiber*.Ctx*.Get"
      # fasthttp (github.com/valyala/fasthttp) — *fasthttp.RequestCtx.
      - "go:*fasthttp.RequestCtx*.FormValue"
      - "go:*fasthttp.RequestCtx*.UserValue"
    # The filesystem path is logical arg 0 for the os/ioutil sinks (os.WriteFile's
    # data/perm args, for instance, are not path-traversal injection points).
    # http.ServeFile(w, r, name) serves the file at `name` over HTTP — the
    # textbook path-traversal sink — and its path is logical arg 2.
    sinks:
      - "go:os.Open*#0"
      - "go:os.ReadFile#0"
      - "go:os.WriteFile#0"
      - "go:os.Create#0"
      - "go:*ioutil.ReadFile#0"
      - "go:*net/http.ServeFile#2"
    # filepath.Base strips the directory component, so it genuinely prevents
    # traversal. filepath.Clean / filepath.Join do NOT contain input to a base
    # directory ("/data" + "../../etc" cleans to "/etc"), so they are treated
    # as propagators, not sanitizers.
    sanitizers:
      - "go:*filepath.Base"
    propagators:
      - "go:strings.Join"
      - "go:*filepath.Join"
      - "go:*filepath.Clean"
    # Guard/barrier validators (ENG-9): a boolean containment check that, when it
    # dominates the branch reaching the sink, proves the path was validated on
    # that path and suppresses the finding. filepath.IsLocal reports whether a
    # path stays within the current directory tree (rejects "..", absolute, and
    # reserved names) — the canonical path-traversal barrier (`if !IsLocal(p) {
    # return }; os.Open(p)`).
    validators:
      - "go:*filepath.IsLocal"
