# Server-Side Request Forgery: untrusted HTTP/URL input flowing into an
# outbound HTTP request's target URL.
rules:
  - id: py-ssrf
    languages: [python]
    # Align with go-ssrf (same CWE-918) so the CI gate treats SSRF
    # identically regardless of source language.
    severity: high
    cwe: CWE-918
    message: >-
      Untrusted input flows into an outbound HTTP request URL, which may
      allow server-side request forgery (SSRF) to internal or unintended
      hosts. Validate the destination against an allow-list before making
      the request.
    sources:
      # Route-handler parameter source (see converters/python/lower.go).
      - "py:@http.param"
      - "py:*request.args.get"
      - "py:*request.headers.get"
      - "py:*request.headers.__getitem__"
      - "py:*request.cookies.get"
      - "py:*request.cookies.__getitem__"
      # Django request accessors.
      - "py:*request.GET.get"
      - "py:*request.GET.__getitem__"
      - "py:*request.POST.get"
      - "py:*request.POST.__getitem__"
      # FastAPI / Starlette request accessors.
      - "py:*request.query_params.__getitem__"
      - "py:*request.query_params.get"
      - "py:*request.path_params.__getitem__"
      - "py:*request.path_params.get"
      # Django REST Framework: request.data (the parsed request body).
      - "py:*request.data"
      - "py:*request.data.get"
      - "py:*request.data.__getitem__"
      - "py:*request.json"
      - "py:*request.form"
      - "py:*request.get_json"
      - "py:*request.get_data"
      - "py:*request.form.get"
      - "py:*request.values.get"
      - "py:*request.args.__getitem__"
      - "py:*request.form.__getitem__"
      - "py:*request.values.__getitem__"
    sinks:
      - "py:requests.get"
      - "py:requests.post"
      # requests.request(method, url, ...) — the generic verb-dispatching call
      # (CVE-2025-52967, mlflow gateway_proxy_handler). The URL is arg #1, so pin
      # it with #1 (the HTTP method in arg #0 is not the injection point).
      - "py:*requests.request#1"
      # httpx outbound requests, module-level functions and the client-instance
      # streaming API (CVE-2024-48052, gradio save_url_to_cache:
      # client.stream("GET", url, follow_redirects=True)). For .stream/.request
      # the URL follows the HTTP method, so pin arg #1; httpx.get/post take the
      # URL as arg #0. Scoped to httpx.* and *client.* (the httpx.Client /
      # AsyncClient idiom) rather than a bare *.stream/*.request to avoid
      # matching unrelated stream/request methods.
      - "py:httpx.get"
      - "py:httpx.post"
      - "py:httpx.stream#1"
      - "py:httpx.request#1"
      - "py:*client.stream#1"
      - "py:*client.request#1"
      - "py:*urlopen"
    # No built-in sanitizer neutralizes tainted input for a request URL;
    # the fix is allow-listing the destination host, not escaping.
    sanitizers: []
