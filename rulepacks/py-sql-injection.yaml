# SQL injection: untrusted request input flowing into a DB-API cursor/query
# execution without parameterization.
#
# The "#0" suffix on each sink names the LOGICAL (source-level) index of the
# query-string argument, so a parameterized call like
# cursor.execute("... = ?", userInput) -- where userInput is a bound
# placeholder value at a later position, not part of the query text -- is NOT
# flagged. This mirrors go-sql-injection.yaml's identical treatment of
# database/sql's Query/Exec family.
rules:
  - id: py-sql-injection
    languages: [python]
    severity: high
    cwe: CWE-89
    message: >-
      Untrusted input flows into a database query execution without
      parameterized arguments, which may allow SQL injection. Use
      parameterized queries (e.g. cursor.execute(sql, params)) instead of
      concatenating or formatting user input into the query string.
    sources:
      - "py:*request.args.get"
      - "py:*request.headers.get"
      - "py:*request.headers.__getitem__"
      - "py:*request.cookies.get"
      - "py:*request.cookies.__getitem__"
      # Django request accessors.
      - "py:*request.GET.get"
      - "py:*request.GET.__getitem__"
      - "py:*request.POST.get"
      - "py:*request.POST.__getitem__"
      # FastAPI / Starlette request accessors.
      - "py:*request.query_params.__getitem__"
      - "py:*request.query_params.get"
      - "py:*request.path_params.__getitem__"
      - "py:*request.path_params.get"
      # Django REST Framework: request.data (the parsed request body).
      - "py:*request.data"
      - "py:*request.data.get"
      - "py:*request.data.__getitem__"
      - "py:*request.json"
      - "py:*request.form"
      - "py:*request.get_json"
      - "py:*request.get_data"
      - "py:*request.form.get"
      - "py:*request.values.get"
      - "py:*request.args.__getitem__"
      - "py:*request.form.__getitem__"
      - "py:*request.values.__getitem__"
    sinks:
      - "py:*.execute#0"
      - "py:*.executemany#0"
      - "py:*.executescript#0"
    # No built-in sanitizer neutralizes tainted input for raw SQL string
    # construction; the fix is parameterized queries, not escaping.
    sanitizers: []
    propagators:
      - "py:*.join"
