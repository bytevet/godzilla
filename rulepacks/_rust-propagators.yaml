# Shared Rust string/Option/Result/iterator propagators. Pulled into rust SQLi/
# command/ssrf with `extend: [$_rust-sources.yaml, $_rust-propagators.yaml]`.
# (rust-path-traversal keeps its own path-specific propagators instead.)
propagators:
  - "rust:*unwrap"
  - "rust:*unwrap_or"
  - "rust:*unwrap_or_default"
  - "rust:*expect"
  - "rust:*as_ref"
  - "rust:*as_bytes"
  - "rust:*clone"
  - "rust:*deref"
  - "rust:*into"
  - "rust:*collect"
  - "rust:*join"
  - "rust:*concat"
  - "rust:*push_str"
  - "rust:*index"
  - "rust:*get"
  - "rust:*nth"
  - "rust:*first"
  - "rust:*last"
  - "rust:*iter"
  - "rust:*next"
  - "rust:*map"
  - "rust:*chars"
  - "rust:*split"
  - "rust:*splitn"
  - "rust:*lines"
  - "rust:*bytes"
  - "rust:*to_vec"
  - "rust:*from_utf8"
  - "rust:*from_utf8_lossy"
  - "rust:*String::from"
  - "rust:format"
  - "rust:*must_use"
  - "rust:*new_display"
  - "rust:*new_debug"
  - "rust:*Arguments::new"
