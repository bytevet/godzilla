# SQL injection: untrusted HTTP/URL input flowing into database/sql query
# construction without parameterization.
#
# The "#<n>" suffix on each sink names the LOGICAL (receiver-excluded) index of
# the query-string argument, so a parameterized call like
# db.Query("... = ?", userInput) — where userInput is a bound placeholder value
# at a later position, not part of the query text — is NOT flagged. The Context
# variants take ctx as their first argument, so their query string is at index 1.
rules:
  - id: go-sql-injection
    languages: [go]
    severity: high
    cwe: CWE-89
    message: >-
      Untrusted input flows into a database/sql query without parameterized
      arguments, which may allow SQL injection. Use placeholder parameters
      (e.g. "?" / "$1") instead of concatenating or formatting user input
      into the query string.
    sources:
      - "go:*net/url*.Get"
      - "go:*net/http.Header*.Get"
      # Synthetic request-object source: the frontend taints an HTTP handler's
      # *http.Request parameter (converters/go addHTTPRequestSource), so field
      # reads off it (r.URL.Path, r.Form, r.Body, …) — which no method rule can
      # match — are covered for net/http and any router built on it (chi,
      # gorilla/mux, …).
      - "go:@net/http.Request"
      # Web-framework request accessors, receiver-type-scoped so they never
      # collide with a same-named sink (e.g. sql.DB.Query).
      # Gin (github.com/gin-gonic/gin).
      - "go:*gin-gonic/gin.Context*.Query"
      - "go:*gin-gonic/gin.Context*.DefaultQuery"
      - "go:*gin-gonic/gin.Context*.QueryArray"
      - "go:*gin-gonic/gin.Context*.QueryMap"
      - "go:*gin-gonic/gin.Context*.GetQuery"
      - "go:*gin-gonic/gin.Context*.Param"
      - "go:*gin-gonic/gin.Context*.PostForm"
      - "go:*gin-gonic/gin.Context*.DefaultPostForm"
      - "go:*gin-gonic/gin.Context*.GetHeader"
      # Echo (github.com/labstack/echo).
      - "go:*labstack/echo*Context*.QueryParam"
      - "go:*labstack/echo*Context*.QueryParams"
      - "go:*labstack/echo*Context*.Param"
      - "go:*labstack/echo*Context*.FormValue"
      - "go:*labstack/echo*Context*.FormParams"
      # Chi (github.com/go-chi/chi).
      - "go:*go-chi/chi*.URLParam"
      # Gorilla mux (github.com/gorilla/mux) — path variables.
      - "go:*gorilla/mux.Vars"
      # Fiber (github.com/gofiber/fiber) — *fiber.Ctx.
      - "go:*gofiber/fiber*.Ctx*.Query"
      - "go:*gofiber/fiber*.Ctx*.Params"
      - "go:*gofiber/fiber*.Ctx*.FormValue"
      - "go:*gofiber/fiber*.Ctx*.Cookies"
      - "go:*gofiber/fiber*.Ctx*.Get"
      # fasthttp (github.com/valyala/fasthttp) — *fasthttp.RequestCtx.
      - "go:*fasthttp.RequestCtx*.FormValue"
      - "go:*fasthttp.RequestCtx*.UserValue"
    sinks:
      - "go:*database/sql*.Query#0"
      - "go:*database/sql*.QueryRow#0"
      - "go:*database/sql*.Exec#0"
      - "go:*database/sql*.QueryContext#1"
      - "go:*database/sql*.QueryRowContext#1"
      - "go:*database/sql*.ExecContext#1"
      # Gorm ORM query builders — the raw SQL string is logical arg 0, so a
      # parameterized call like db.Where("id = ?", v) is not flagged.
      - "go:*gorm*.DB*.Raw#0"
      - "go:*gorm*.DB*.Exec#0"
      - "go:*gorm*.DB*.Where#0"
      - "go:*gorm*.DB*.Order#0"
    # No built-in sanitizer neutralizes tainted input for raw SQL string
    # construction; the fix is parameterized queries, not escaping.
    sanitizers: []
    propagators:
      - "go:fmt.Sprintf"
      - "go:fmt.Sprint"
      - "go:fmt.Sprintf*"
      - "go:strings.Join"
      - "go:strings.Replace*"
