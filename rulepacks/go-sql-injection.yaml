# SQL injection (CWE-89): untrusted HTTP/URL input flowing into a database/sql
# query without parameterization.
#
# The "#<n>" suffix on each sink names the LOGICAL (receiver-excluded) index of
# the query-string argument, so a parameterized call db.Query("... = ?", input) —
# where input is a bound placeholder, not part of the query text — is NOT flagged.
# The Context variants take ctx first, so their query string is at index 1.
rules:
  - id: go-sql-injection
    languages: [go]
    severity: high
    cwe: CWE-89
    message: >-
      Untrusted input flows into a database/sql query without parameterized
      arguments, which may allow SQL injection. Use placeholder parameters
      (e.g. "?" / "$1") instead of concatenating or formatting user input
      into the query string.
    extend: $_go-common.yaml
    sinks:
      - "go:*database/sql*.Query#0"
      - "go:*database/sql*.QueryRow#0"
      - "go:*database/sql*.Exec#0"
      - "go:*database/sql*.QueryContext#1"
      - "go:*database/sql*.QueryRowContext#1"
      - "go:*database/sql*.ExecContext#1"
      # Gorm ORM query builders — the raw SQL string is logical arg 0, so a
      # parameterized call like db.Where("id = ?", v) is not flagged.
      - "go:*gorm*.DB*.Raw#0"
      - "go:*gorm*.DB*.Exec#0"
      - "go:*gorm*.DB*.Where#0"
      - "go:*gorm*.DB*.Order#0"
      # xorm ORM query builders (xorm.io/xorm and the go-xorm fork). Same rule:
      # the raw SQL fragment is logical arg 0, so a parameterized call like
      # session.And("owner=?", v) is not flagged; only a formatted/concatenated
      # fragment — session.And(fmt.Sprintf("%s like ?", field), v) — fires.
      - "go:*xorm*.Sql#0"
      - "go:*xorm*.SQL#0"
      - "go:*xorm*.Where#0"
      - "go:*xorm*.And#0"
      - "go:*xorm*.Or#0"
      - "go:*xorm*.Having#0"
      - "go:*xorm*.Query#0"
      - "go:*xorm*.Exec#0"
    # No sanitizer neutralizes tainted input for raw SQL; the fix is parameterized
    # queries, not escaping.
    sanitizers: []
