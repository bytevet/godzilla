# Server-Side Request Forgery (CWE-918): untrusted HTTP/URL input flowing into
# an outbound HTTP request's target URL.
rules:
  - id: go-ssrf
    languages: [go]
    severity: high
    cwe: CWE-918
    message: >-
      Untrusted input flows into an outbound HTTP request URL, which may
      allow server-side request forgery (SSRF) to internal or unintended
      hosts. Validate the destination against an allow-list before making
      the request.
    extend: $_go-common.yaml
    sinks:
      - "go:*net/http.Get"
      - "go:*net/http.Post"
      - "go:*net/http*.Client*.Do"
      - "go:*net/http.NewRequest*"
    # No sanitizer neutralizes tainted input for a request URL; the fix is
    # allow-listing the destination host, not escaping.
    sanitizers: []
