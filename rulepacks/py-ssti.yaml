# Server-Side Template Injection (Python, CWE-1336): untrusted input used as the
# TEMPLATE STRING of a Jinja2/Mako engine is compiled and executed server-side —
# a path to RCE (`{{ ''.__class__.__mro__[1].__subclasses__() }}`). The danger is
# building the template FROM user input; passing user data as template CONTEXT
# (the normal, safe path) is not a finding, so only the template-source argument
# (#0) is the injection point.
rules:
  - id: py-ssti
    languages: [python]
    severity: critical
    cwe: CWE-1336
    message: >-
      Untrusted input is used as a template string (render_template_string /
      jinja2.Template / Environment.from_string), which the engine compiles and
      executes server-side — server-side template injection, a path to RCE. Never
      build a template from user input; render a fixed template and pass the user
      data as context instead.
    extend: $_py-sources.yaml
    sinks:
      # The template SOURCE argument (#0) only — a user-controlled context kwarg
      # is the safe, intended path and must not fire.
      - "py:*render_template_string#0"
      - "py:*jinja2.Template#0"
      - "py:*Environment.from_string#0"
      - "py:*mako*.Template#0"
    sanitizers: []
