# Command injection (CWE-78): untrusted HTTP/URL input flowing into os/exec.
rules:
  - id: go-command-injection
    languages: [go]
    severity: critical
    cwe: CWE-78
    message: >-
      Untrusted input flows into os/exec command construction, which may
      allow arbitrary command execution. Avoid building shell commands from
      user input; if unavoidable, pass arguments individually and never via
      a shell interpreter.
    extend: $_go-common.yaml
    sinks:
      - "go:*os/exec.Command"
      - "go:*os/exec.CommandContext"
    # No sanitizer neutralizes tainted input for shell command construction;
    # avoid passing tainted data to exec entirely.
    sanitizers: []
