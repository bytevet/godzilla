# Command injection (CWE-78): untrusted HTTP/URL input flowing into os/exec.
rules:
  - id: go-command-injection
    languages: [go]
    severity: critical
    cwe: CWE-78
    message: >-
      Untrusted input flows into os/exec command construction, which may
      allow arbitrary command execution. Avoid building shell commands from
      user input; if unavoidable, pass arguments individually and never via
      a shell interpreter.
    sources:
      - "go:*net/url*.Get"
      - "go:*net/http.Header*.Get"
      # Synthetic source: the frontend taints an HTTP handler's *http.Request
      # param (converters/go addHTTPRequestSource) so field reads off it
      # (r.URL.Path, r.Form, …) are covered for net/http and any router on it.
      - "go:@net/http.Request"
      # Framework request accessors, receiver-type-scoped so they never collide
      # with a same-named sink (e.g. sql.DB.Query).
      # Gin and Echo request accessors are intentionally NOT listed: their route
      # handlers are recognized (collectRouteHandlers, incl. variadic/named-
      # HandlerFunc registration) and their accessor bodies are lowered as
      # dependencies, so request-object provenance carries taint through them.
      # Fiber/fasthttp remain below: their accessors bottom out in untraceable
      # fasthttp byte-parsing, so the explicit source glob is still required.
      # Chi.
      - "go:*go-chi/chi*.URLParam"
      # Gorilla mux — path variables.
      - "go:*gorilla/mux.Vars"
      # Macaron / Grafana route params (grafana/pkg/web.Params) — a free-function
      # route accessor like mux.Vars returning untrusted path/query params.
      - "go:*web.Params"
      # Fiber — *fiber.Ctx.
      - "go:*gofiber/fiber*.Ctx*.Query"
      - "go:*gofiber/fiber*.Ctx*.Params"
      - "go:*gofiber/fiber*.Ctx*.FormValue"
      - "go:*gofiber/fiber*.Ctx*.Cookies"
      - "go:*gofiber/fiber*.Ctx*.Get"
      # fasthttp — *fasthttp.RequestCtx.
      - "go:*fasthttp.RequestCtx*.FormValue"
      - "go:*fasthttp.RequestCtx*.UserValue"
    # The synthetic request object also grants request-object provenance, so
    # accessor calls on it are covered even for an unmodeled framework (engine
    # reads this tag instead of a hardcoded source name).
    request_object_sources:
      - "go:@net/http.Request"
    sinks:
      - "go:*os/exec.Command"
      - "go:*os/exec.CommandContext"
    # No sanitizer neutralizes tainted input for shell command construction;
    # avoid passing tainted data to exec entirely.
    sanitizers: []
    propagators:
      - "go:strings.Join"
