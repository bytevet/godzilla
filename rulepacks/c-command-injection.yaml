# OS command injection (C/C++): untrusted input flowing into a shell execution.
rules:
  - id: c-command-injection
    languages: [c, cpp]
    severity: critical
    cwe: CWE-78
    message: >-
      Untrusted input (environment, stdin, socket, command line, etc.) flows into
      a process/shell execution (system/popen/exec*), which may allow OS command
      injection. Never pass user-controlled data as the shell command or the
      program path; use a fixed program with an argument vector and validate
      inputs.
    extend: [$_c-sources.yaml, $_c-propagators.yaml]
    sinks:
      - "c*:system"
      - "c*:popen"
      - "c*:execl"
      - "c*:execlp"
      - "c*:execle"
      - "c*:execv"
      - "c*:execvp"
      - "c*:execvpe"
      - "c*:execvP"
      - "c*:execve"
      - "c*:execveat"
      - "c*:fexecve"
    sanitizers: []
