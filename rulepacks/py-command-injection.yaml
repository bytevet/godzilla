# Command injection: untrusted request input flowing into a shell/process
# execution sink.
rules:
  - id: py-command-injection
    languages: [python]
    severity: critical
    cwe: CWE-78
    message: >-
      Untrusted input flows into a shell/process execution call, which may
      allow arbitrary command execution. Avoid building shell commands from
      user input; if unavoidable, pass arguments as a list and never invoke
      a shell interpreter (shell=True).
    sources:
      - "py:*request.args.get"
      - "py:*request.headers.get"
      - "py:*request.headers.__getitem__"
      - "py:*request.cookies.get"
      - "py:*request.cookies.__getitem__"
      # Django request accessors.
      - "py:*request.GET.get"
      - "py:*request.GET.__getitem__"
      - "py:*request.POST.get"
      - "py:*request.POST.__getitem__"
      # FastAPI / Starlette request accessors.
      - "py:*request.query_params.__getitem__"
      - "py:*request.query_params.get"
      - "py:*request.path_params.__getitem__"
      - "py:*request.json"
      - "py:*request.form"
      - "py:*request.get_json"
      - "py:*request.get_data"
      - "py:*request.form.get"
      - "py:*request.values.get"
      - "py:*request.args.__getitem__"
      - "py:*request.form.__getitem__"
      - "py:*request.values.__getitem__"
    sinks:
      - "py:os.system"
      - "py:os.popen"
      - "py:subprocess.*"
      - "py:*.subprocess.*"
    # No built-in sanitizer neutralizes tainted input for shell command
    # construction; avoid passing tainted data to a shell entirely.
    sanitizers: []
    propagators:
      - "py:*.join"
