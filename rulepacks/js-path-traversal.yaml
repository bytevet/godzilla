# Path traversal: untrusted request input flowing into filesystem access
# without path normalization/containment.
rules:
  - id: js-path-traversal
    languages: [javascript]
    # Align with go-path-traversal (same CWE-22) so the CI gate treats path
    # traversal identically regardless of source language.
    severity: high
    cwe: CWE-22
    message: >-
      Untrusted request input (query string, route params, or body) flows
      into a filesystem path without being cleaned or validated, which may
      allow path traversal (e.g. "../" sequences) to read or serve files
      outside the intended directory. Validate/normalize the path and confirm
      it stays within an allowed base directory before use.
    extend: $_js-sources.yaml
    # `*fs.readFile*` also matches the "Sync"/promises variants
    # (fs.readFileSync, fs.promises.readFile); `*fs.createReadStream` covers
    # streamed reads; broad `*.sendFile` (not `*res.sendFile`) so a chained
    # response like res.status(200).sendFile(p) -- which lowers to callee
    # "js:<dynamic>.sendFile" -- is still caught, mirroring js-xss's broad
    # `js:*.send`.
    sinks:
      - "js:*fs.readFile*"
      - "js:*fs.createReadStream"
      - "js:*.sendFile"
      # File reads are not always on the literal `fs` module: a static-file
      # server often reads through an injected filesystem abstraction (memfs,
      # webpack-dev-middleware's `context.outputFileSystem`, a Vinyl/GracefulFS
      # wrapper), so the receiver is an opaque object rather than `fs`. Match the
      # read/stat entry points by method name so a tainted path handed to any
      # `*.statSync`/`*.createReadStream` is caught. These are reads that act on
      # a path argument, so a tainted path reaching them is the traversal; they
      # do not fire without taint, so broadening the receiver adds no FP.
      - "js:*.statSync"
      - "js:*.createReadStream"
    # path.basename strips the directory component, so it genuinely prevents
    # traversal, mirroring go-path-traversal's filepath.Base. path.join /
    # path.resolve / path.normalize do NOT contain input to a base directory
    # ("/data" + "../../etc" resolves to "/etc"), so they are treated as
    # propagators, not sanitizers.
    sanitizers:
      - "js:*path.basename"
    propagators:
      - "js:*path.join"
      - "js:*path.resolve"
      - "js:*path.normalize"
      # URL/query decoding of an already-tainted value returns an equally
      # tainted value (they decode `%2e%2e` -> `..`, if anything WIDENING the
      # traversal surface), so they carry taint from arg to result. Modeled as
      # propagators (not sanitizers): decoding never contains a path to a base
      # directory. querystring.unescape sits between the request pathname and
      # path.join in webpack-dev-middleware's getFilenameFromUrl.
      - "js:*querystring.unescape"
      - "js:*querystring.parse"
      - "js:*url.parse"
