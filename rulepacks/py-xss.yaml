# Cross-site scripting: untrusted HTTP/URL input flowing into an HTTP
# response body without escaping.
rules:
  - id: py-xss
    languages: [python]
    # Align with go-xss/js-xss (same CWE-79) so the CI gate treats reflected
    # XSS identically regardless of source language.
    severity: medium
    cwe: CWE-79
    message: >-
      Untrusted input flows into an HTTP response body without being
      HTML-escaped, which may allow cross-site scripting (XSS). Escape the
      value (e.g. markupsafe.escape / html.escape) or render it through a
      template engine with autoescaping enabled instead of concatenating it
      directly into the response body.
    extend: $_py-sources.yaml
    sinks:
      # "*render_template_string" catches building the *template source*
      # itself from tainted input (as opposed to passing tainted input as a
      # context variable into a fixed template, which Flask autoescapes).
      # The response sinks catch constructing a raw HTML body directly, bare
      # (`Response(html)`) or qualified (`flask.Response(html)`). Narrowed from a
      # bare "*Response" glob, which also matched FileResponse/StreamingResponse
      # (file/stream serving -> path traversal, not XSS) and RedirectResponse
      # (open redirect) -- false positives once handler params are tainted.
      # #0 pins the template-source argument, so a tainted CONTEXT variable
      # (`render_template_string(fixed, name=user)`, autoescaped and safe) does not
      # fire — matching the comment above.
      - "py:*render_template_string#0"
      - "py:Response"
      - "py:*.Response"
      - "py:*HTMLResponse"
      - "py:*HttpResponse"
      - "py:*PlainTextResponse"
      - "py:*make_response"
    # Explicit HTML-escapers only. The old "py:*escape" glob also matched
    # html.unescape — the OPPOSITE of a sanitizer — so it is replaced with the
    # canonical named escapers (COV-9).
    sanitizers:
      - "py:*markupsafe.escape"
      - "py:*markupsafe.Markup"
      - "py:*html.escape"
      - "py:*flask.escape"
      - "py:*cgi.escape"
    propagators: []
