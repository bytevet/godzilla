# Cross-site scripting: untrusted HTTP/URL input flowing into an HTTP
# response body without escaping.
rules:
  - id: py-xss
    languages: [python]
    # Align with go-xss/js-xss (same CWE-79) so the CI gate treats reflected
    # XSS identically regardless of source language.
    severity: medium
    cwe: CWE-79
    message: >-
      Untrusted input flows into an HTTP response body without being
      HTML-escaped, which may allow cross-site scripting (XSS). Escape the
      value (e.g. markupsafe.escape / html.escape) or render it through a
      template engine with autoescaping enabled instead of concatenating it
      directly into the response body.
    sources:
      - "py:*request.args.get"
      - "py:*request.headers.get"
      - "py:*request.headers.__getitem__"
      - "py:*request.cookies.get"
      - "py:*request.cookies.__getitem__"
      # Django request accessors.
      - "py:*request.GET.get"
      - "py:*request.GET.__getitem__"
      - "py:*request.POST.get"
      - "py:*request.POST.__getitem__"
      # FastAPI / Starlette request accessors.
      - "py:*request.query_params.__getitem__"
      - "py:*request.query_params.get"
      - "py:*request.path_params.__getitem__"
      - "py:*request.json"
      - "py:*request.form"
      - "py:*request.get_json"
      - "py:*request.get_data"
      - "py:*request.form.get"
      - "py:*request.values.get"
      - "py:*request.args.__getitem__"
      - "py:*request.form.__getitem__"
      - "py:*request.values.__getitem__"
    sinks:
      # "*render_template_string" catches building the *template source*
      # itself from tainted input (as opposed to passing tainted input as a
      # context variable into a fixed template, which Flask autoescapes).
      # Broad "*Response"/"*make_response" catch constructing a raw HTTP
      # response body directly, whether imported bare (`Response(html)`) or
      # qualified (`flask.Response(html)`).
      - "py:*render_template_string"
      - "py:*Response"
      - "py:*make_response"
    sanitizers:
      - "py:*escape"
    propagators: []
