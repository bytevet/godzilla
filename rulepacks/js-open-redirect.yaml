# Open redirect: untrusted input flowing into a response redirect (Express).
rules:
  - id: js-open-redirect
    languages: [javascript]
    severity: medium
    cwe: CWE-601
    message: >-
      Untrusted request input flows into a response redirect, which allows an
      open redirect. Validate the target against an allowlist instead of
      redirecting to a user-controlled URL.
    sources:
      - "js:*req.query*"
      - "js:*req.headers*"
      - "js:*req.cookies*"
      - "js:*req.get"
      - "js:*req.header"
      - "js:*ctx.headers*"
      - "js:*ctx.cookies*"
      - "js:*req.params*"
      - "js:*req.body*"
      # Koa request accessors (ctx.query, ctx.params, ctx.request.body/query).
      - "js:*ctx.query*"
      - "js:*ctx.params*"
      - "js:*ctx.request*"
    sinks:
      - "js:*.redirect"
    sanitizers: []
    propagators: []
