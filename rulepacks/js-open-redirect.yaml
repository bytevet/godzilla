# Open redirect: untrusted input flowing into a response redirect (Express).
rules:
  - id: js-open-redirect
    languages: [javascript]
    severity: medium
    cwe: CWE-601
    message: >-
      Untrusted request input flows into a response redirect, which allows an
      open redirect. Validate the target against an allowlist instead of
      redirecting to a user-controlled URL.
    extend: $_js-sources.yaml
    sinks:
      - "js:*.redirect"
    sanitizers:
      - "js:encodeURIComponent"
    propagators: []
