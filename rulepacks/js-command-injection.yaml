# OS command injection: untrusted request input flowing into a shell command
# execution.
rules:
  - id: js-command-injection
    languages: [javascript]
    severity: critical
    cwe: CWE-78
    message: >-
      Untrusted request input (query string, route params, or body) flows
      into a shell command execution without sanitization, which may allow
      OS command injection. Avoid passing user-controlled data to a shell
      (child_process.exec/execSync/spawn with shell:true); use execFile or
      spawn with an argument array instead.
    sources:
      - "js:*req.query*"
      - "js:*req.headers*"
      - "js:*req.cookies*"
      - "js:*req.get"
      - "js:*req.header"
      - "js:*req.params*"
      - "js:*req.body*"
      # More Express request accessors (the URL/path are attacker-influenced).
      - "js:*req.originalUrl"
      - "js:*req.path*"
      # Koa request accessors (ctx.query, ctx.params, ctx.headers, ctx.cookies,
      # ctx.request.body/query).
      - "js:*ctx.query*"
      - "js:*ctx.params*"
      - "js:*ctx.headers*"
      - "js:*ctx.cookies*"
      - "js:*ctx.request*"
      # Fastify / Hapi request accessors (request.query/params/body/payload/
      # headers/cookies) — base-scoped to the framework `request` object. The JS
      # frontend only synthesizes a source for a member read off an OPAQUE base
      # (a handler parameter or a free/global), so an ordinary local object named
      # `request` is not turned into a source.
      - "js:*request.query*"
      - "js:*request.params*"
      - "js:*request.body*"
      - "js:*request.payload*"
      - "js:*request.headers*"
      - "js:*request.cookies*"
    # A bare "js:*.exec" sink is deliberately NOT used: it matches
    # RegExp.prototype.exec (regex.exec(userInput)), an extremely common,
    # benign validation call, producing a critical false positive. child_process
    # is matched by its qualified name instead; execSync/spawn have no common
    # benign namesake, so a member match on those is safe.
    sinks:
      - "js:*child_process.exec*"
      - "js:*child_process.spawn*"
      - "js:*.execSync"
      - "js:*.execFileSync"
      - "js:*.spawn"
    sanitizers: []
    propagators: []
