# OS command injection (Rust): untrusted input flowing into std::process::Command.
#
# Names match the Rust frontend's canonical form, which is rustc's source-level
# MIR path with generics stripped and a "rust:" prefix (e.g. std::env::var()
# prints as the bare free function `var`; Command::arg() as `Command::arg`).
# Method calls carry the receiver as operand 0, so a sink pins the tainted
# argument with `#1` (and Command::new, an associated fn with no receiver, uses
# `#0`) to keep the fixed program/flags from being flagged.
rules:
  - id: rust-command-injection
    languages: [rust]
    severity: critical
    cwe: CWE-78
    message: >-
      Untrusted input (an HTTP request parameter, header, or body) flows into a
      std::process command, which may allow OS command injection. Validate or
      allow-list the program and arguments instead of passing user-controlled
      data to a shell.
    sources:
      # axum extractors — request data arrives as typed handler params
      # (Query/Path/Json/Form), synthesized as sources by the frontend (COV-7).
      - "rust:axum::extract::Query"
      - "rust:axum::extract::Path"
      - "rust:axum::extract::Json"
      - "rust:axum::extract::Form"
      # Non-generic axum body/query extractors (raw query string / raw form body).
      - "rust:axum::extract::RawQuery"
      - "rust:axum::extract::RawForm"
      # HTTP request accessors — the real attack surface (query/path params,
      # headers, request body). Matches a request object's accessor methods
      # across the common web frameworks plus a generic Request::{query,header,
      # body,get_param,param} shape.
      - "rust:*Request::query"
      - "rust:*Request::header"
      - "rust:*Request::body"
      - "rust:*Request::get_param"
      - "rust:*Request::param"
      - "rust:*HttpRequest::query_string"
      - "rust:*HttpRequest::headers"
      - "rust:*HttpRequest::match_info"
      - "rust:*HttpRequest::uri"
      - "rust:*HttpRequest::cookie"
      # rocket/warp/generic request accessors — the URI, headers and cookies are
      # all attacker-controlled (base-scoped to the request type).
      - "rust:*Request::uri"
      - "rust:*Request::headers"
      - "rust:*Request::cookies"
      # Environment / CLI args — a real but secondary source (CLI tools, CGI).
      - "rust:var"
      - "rust:var_os"
      - "rust:*env::var"
      - "rust:*env::var_os"
      - "rust:args"
      - "rust:args_os"
      - "rust:*env::args"
      - "rust:*env::args_os"
    sinks:
      - "rust:*Command::new#0"
      - "rust:*Command::arg#1"
      - "rust:*Command::args#1"
    sanitizers: []
    propagators:
      - "rust:*unwrap"
      - "rust:*unwrap_or"
      - "rust:*unwrap_or_default"
      - "rust:*expect"
      - "rust:*to_string"
      - "rust:*to_owned"
      - "rust:*as_str"
      - "rust:*as_ref"
      - "rust:*as_bytes"
      - "rust:*clone"
      - "rust:*deref"
      - "rust:*into"
      - "rust:*trim"
      - "rust:*collect"
      - "rust:*join"
      - "rust:*concat"
      - "rust:*push_str"
      - "rust:*index"
      - "rust:*get"
      - "rust:*nth"
      - "rust:*first"
      - "rust:*last"
      - "rust:*iter"                 # also matches *into_iter
      - "rust:*next"
      - "rust:*map"
      - "rust:*chars"
      - "rust:*split"
      - "rust:*splitn"
      - "rust:*lines"
      - "rust:*bytes"
      - "rust:*to_vec"
      - "rust:*from_utf8"
      - "rust:*from_utf8_lossy"
      - "rust:*String::from"
      - "rust:format"
      - "rust:*must_use"
      - "rust:*new_display"
      - "rust:*new_debug"
      - "rust:*Arguments::new"
