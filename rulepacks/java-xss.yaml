# Reflected XSS (Java): untrusted request input written into an HTTP response
# body without HTML-escaping, so an attacker-controlled value is reflected into
# the page and executed by the browser.
rules:
  - id: java-xss
    languages: [java]
    severity: medium
    cwe: CWE-79
    message: >-
      Untrusted input is written to the HTTP response without HTML-escaping,
      which may allow reflected cross-site scripting (XSS). Escape the value
      (e.g. Spring HtmlUtils.htmlEscape, OWASP Encoder.forHtml, or Apache
      StringEscapeUtils.escapeHtml4) or render through a template engine that
      auto-escapes by context.
    # Sources: the shared request surface plus the process environment, both from
    # fragments (env first so getenv keeps its position in the merged list).
    extend: [$_java-env-source.yaml, $_java-sources.yaml]
    # The tainted string is the value written; it is logical arg 0 of the
    # response writer/stream call.
    sinks:
      - "java:*PrintWriter.print#0"
      - "java:*PrintWriter.println#0"
      - "java:*PrintWriter.append#0"
      - "java:*Writer.write#0"
      - "java:*ServletOutputStream.print#0"
      - "java:*ServletOutputStream.println#0"
    sanitizers:
      - "java:*HtmlUtils.htmlEscape"
      - "java:*StringEscapeUtils.escapeHtml*"
      - "java:*Encode.forHtml*"
      - "java:*ESAPI*encodeForHTML*"
