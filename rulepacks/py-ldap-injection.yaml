# LDAP injection (Python, CWE-90): untrusted input concatenated into an LDAP
# search filter or base DN lets an attacker alter the query — auth bypass
# (`*)(uid=*))(|(uid=*`) or unauthorized data disclosure. Escape user input with
# ldap.filter.escape_filter_chars / ldap.dn.escape_dn_chars (or the ldap3
# equivalents) before building the filter.
rules:
  - id: py-ldap-injection
    languages: [python]
    severity: high
    cwe: CWE-90
    message: >-
      Untrusted input flows into an LDAP search filter/DN (search_s /
      search_ext_s), allowing LDAP injection (authentication bypass or data
      disclosure). Escape the value with ldap.filter.escape_filter_chars (or
      ldap.dn.escape_dn_chars for a DN) before building the query.
    extend: $_py-sources.yaml
    sinks:
      # python-ldap search family (the _s/_ext_s suffixes are LDAP-specific, so
      # they don't collide with the generic re.search / str-search). Both the
      # filter and the base DN are injectable, so no arg is pinned.
      - "py:*.search_s"
      - "py:*.search_st"
      - "py:*.search_ext_s"
      - "py:*.search_ext"
    sanitizers:
      - "py:*escape_filter_chars"
      - "py:*escape_dn_chars"
