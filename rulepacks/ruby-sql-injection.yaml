# SQL injection (Ruby / Rails, CWE-89): untrusted input interpolated into a raw
# SQL string passed to a query API. The safe forms (parameterized where(hash),
# where("x = ?", v), sanitize_sql) are not string-building sinks, so only the
# raw-string execute/find_by_sql/interpolated-where paths fire here.
rules:
  - id: ruby-sql-injection
    languages: [ruby]
    severity: critical
    cwe: CWE-89
    message: >-
      Untrusted input flows into a raw SQL string executed by ActiveRecord / a
      database driver, which may allow SQL injection. Use parameterized queries
      (where("col = ?", value) or where(col: value)) instead of interpolating
      input into the SQL string.
    # Request sources are base-scoped: the frontend synthesizes a source CALL
    # `ruby:<base>.<accessor>` for any accessor read off an opaque request base
    # (a handler parameter or a free framework accessor), so these globs match a
    # whole framework's request object rather than a fixed member list.
    sources:
      - "ruby:params"          # params[:x] / params['x']
      - "ruby:cookies"         # cookies[:x]
      - "ruby:params.*"        # params.fetch(:x) / params.dig(...)
      - "ruby:cookies.*"
      - "ruby:request.*"       # request.<accessor> (Rails/Sinatra/Rack request)
      - "ruby:req.*"           # conventional `req` request receiver
    sinks:
      - "ruby:*execute"              # connection.execute("... #{x}")
      - "ruby:*exec_query"
      - "ruby:*find_by_sql"
      - "ruby:*.where_sql"
    sanitizers:
      - "ruby:*.sanitize_sql"
      - "ruby:*.quote"
    propagators:
      - "ruby:*.to_s"
      - "ruby:*.strip"
      - "ruby:*.join"
