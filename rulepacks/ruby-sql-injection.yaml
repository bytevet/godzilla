# SQL injection (Ruby / Rails, CWE-89): untrusted input interpolated into a raw
# SQL string passed to a query API. The safe forms (parameterized where(hash),
# where("x = ?", v), sanitize_sql) are not string-building sinks, so only the
# raw-string execute/find_by_sql/interpolated-where paths fire here.
rules:
  - id: ruby-sql-injection
    languages: [ruby]
    severity: critical
    cwe: CWE-89
    message: >-
      Untrusted input flows into a raw SQL string executed by ActiveRecord / a
      database driver, which may allow SQL injection. Use parameterized queries
      (where("col = ?", value) or where(col: value)) instead of interpolating
      input into the SQL string.
    extend: [$_ruby-sources.yaml, $_ruby-propagators.yaml]
    sinks:
      - "ruby:*execute"              # connection.execute("... #{x}")
      - "ruby:*exec_query"
      - "ruby:*find_by_sql"
      - "ruby:*.where_sql"
      # Arel.sql(x) wraps a RAW SQL fragment that ActiveRecord will not escape
      # (used to bypass its safe-query protection, e.g. inside `where(Arel.sql(
      # "... #{input} ..."))`), so a tainted argument is a direct injection. The
      # receiver `Arel` is operand 0, so the SQL fragment is logical arg #1 — the
      # safe parameterized forms (`where("x = ?", v)`, `where(col: v)`) never call
      # Arel.sql, so this raises no false positive on them.
      - "ruby:Arel.sql#1"
    sanitizers:
      - "ruby:*.sanitize_sql"
      - "ruby:*.quote"
    propagators:
      - "ruby:*.strip"
