# Reflected XSS: untrusted request input flowing into an HTTP response body
# without encoding/escaping.
rules:
  - id: js-xss
    languages: [javascript]
    # Align with go-xss (same CWE-79) so the CI gate treats reflected XSS
    # identically regardless of source language.
    severity: medium
    cwe: CWE-79
    message: >-
      Untrusted request input (query string, route params, or body) flows
      into an HTTP response body without encoding/escaping, which may allow
      reflected Cross-Site Scripting (XSS). Escape or encode user-controlled
      data before writing it into the response (e.g. an HTML-escaping
      template engine) instead of concatenating it directly into the
      response body.
    sources:
      - "js:*req.query*"
      - "js:*req.headers*"
      - "js:*req.cookies*"
      - "js:*req.get"
      - "js:*req.header"
      - "js:*ctx.headers*"
      - "js:*ctx.cookies*"
      - "js:*req.params*"
      - "js:*req.body*"
      # Koa request accessors (ctx.query, ctx.params, ctx.request.body/query).
      - "js:*ctx.query*"
      - "js:*ctx.params*"
      - "js:*ctx.request*"
    # Restrict to HTTP-response receivers (Express `res`, Fastify `reply`,
    # `response`) plus chained responses like res.status(200).send(x), which
    # lower to callee "js:<dynamic>.send". A bare `*.send`/`*.write`/`*.end` is
    # deliberately NOT used: it collides with benign, non-response calls such as
    # mailer.send / stream.write / socket.write / connection.end and fires XSS
    # false positives — the same over-broad-sink mistake avoided in
    # js-command-injection (RegExp.prototype.exec). The cost is missing an
    # exotically named response object (e.g. `myRes.send`), which is rare next to
    # the `res`/`reply` conventions.
    sinks:
      - "js:res.send"
      - "js:res.write"
      - "js:res.end"
      - "js:reply.send"
      - "js:*response.send"
      - "js:*response.write"
      - "js:*response.end"
      - "js:<dynamic>.send"
      - "js:<dynamic>.write"
      - "js:<dynamic>.end"
    # No built-in sanitizer neutralizes tainted input for raw HTML string
    # construction; the fix is output encoding, not string concatenation.
    sanitizers: []
    propagators: []
