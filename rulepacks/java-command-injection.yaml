# OS command injection: untrusted input flowing into a process execution.
rules:
  - id: java-command-injection
    languages: [java]
    severity: critical
    cwe: CWE-78
    message: >-
      Untrusted input (request parameter/header, environment, etc.) flows into a
      process execution (Runtime.exec / ProcessBuilder), which may allow OS
      command injection. Avoid passing user-controlled data to a shell; use a
      fixed argument list and validate inputs.
    # Sources: the shared request surface plus the process environment, both from
    # fragments (env first so getenv keeps its position in the merged list).
    extend: [$_java-env-source.yaml, $_java-sources.yaml]
    sinks:
      - "java:*Runtime.exec"
      - "java:*ProcessBuilder.command"
      - "java:java/lang/ProcessBuilder.<init>"
    sanitizers: []
