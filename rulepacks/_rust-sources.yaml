# Shared Rust sources: web-framework request extractors/accessors plus env & CLI
# args. Pulled into rust SQLi/command/path/ssrf with `extend: $_rust-sources.yaml`.
# (rust-open-redirect/xss use the smaller _rust-web-sources.yaml instead.)
sources:
  - "rust:axum::extract::Query"
  - "rust:axum::extract::Path"
  - "rust:axum::extract::Json"
  - "rust:axum::extract::Form"
  - "rust:axum::extract::RawQuery"
  - "rust:axum::extract::RawForm"
  - "rust:*Request::query"
  - "rust:*Request::header"
  - "rust:*Request::body"
  - "rust:*Request::get_param"
  - "rust:*Request::param"
  - "rust:*HttpRequest::query_string"
  - "rust:*HttpRequest::headers"
  - "rust:*HttpRequest::match_info"
  - "rust:*HttpRequest::uri"
  - "rust:*HttpRequest::cookie"
  - "rust:*Request::uri"
  - "rust:*Request::headers"
  - "rust:*Request::cookies"
  - "rust:var"
  - "rust:var_os"
  - "rust:*env::var"
  - "rust:*env::var_os"
  - "rust:args"
  - "rust:args_os"
  - "rust:*env::args"
  - "rust:*env::args_os"
