# Open redirect (CWE-601): untrusted input flowing into an axum/actix HTTP
# redirect target. axum's Redirect::to/temporary/permanent take the destination
# URL as their first argument.
rules:
  - id: rust-open-redirect
    languages: [rust]
    severity: medium
    cwe: CWE-601
    message: >-
      Untrusted input flows into an HTTP redirect target, which may allow an
      open redirect to an attacker-controlled site. Validate the destination
      against an allow-list of paths/hosts before redirecting.
    extend: $_rust-web-sources.yaml
    sinks:
      - "rust:*Redirect::to"
      - "rust:*Redirect::temporary"
      - "rust:*Redirect::permanent"
    sanitizers: []
    propagators:
      - "rust:format"
      - "rust:*::add"
