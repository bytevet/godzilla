# Buffer overflow / unsafe memory writes (C/C++, CWE-120/CWE-242): both the
# unconditionally-dangerous APIs (gets) and the taint-driven unbounded-copy case.
rules:
  # gets() cannot bound its read and is impossible to use safely, so its use is a
  # defect regardless of dataflow. Modeled call-site-syntactic (kind:
  # dangerous-call) for a near-zero-FP finding, like the weak-crypto packs.
  - id: c-gets-unsafe
    kind: dangerous-call
    languages: [c, cpp]
    severity: high
    cwe: CWE-242
    message: >-
      Use of gets(), which cannot bound its input and always risks a buffer
      overflow. Use fgets() with an explicit size, or getline().
    callees:
      - "c*:gets"

  # Untrusted input reaching an unbounded copy/format into a fixed-size buffer.
  # The bounded variants (strncpy/snprintf/strncat) are propagators, not sinks:
  # they carry taint onward but are not themselves the overflow.
  - id: c-buffer-overflow
    languages: [c, cpp]
    severity: high
    cwe: CWE-120
    message: >-
      Untrusted input flows into an unbounded buffer write (strcpy/strcat/sprintf)
      into a fixed-size buffer, which may overflow it. Use the bounded variants
      (strncpy/strncat/snprintf) with a correct size, or a safe string type.
    extend: [$_c-sources.yaml, $_c-propagators.yaml]
    sinks:
      - "c*:strcpy"
      - "c*:strcat"
      - "c*:sprintf"
      - "c*:vsprintf"
    sanitizers: []
