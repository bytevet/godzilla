name: Quality Gate

# The quality gate compares a PR's base..head across four axes: LOC changed
# (excluding tests), corpus TP/FP/FN, rule churn, and — most importantly —
# scan performance (see scripts/pr-quality-gate.sh).
#
# It is HEAVY: it builds BOTH revisions and runs the corpus scorer + benchmarks
# on each side. So it does not run on every push — it triggers via `workflow_run`
# only AFTER the main CI workflow has finished SUCCESSFULLY, i.e. only on PRs that
# already build and pass tests. `workflow_run` also runs in the base-repo context
# with a write token, so it can post the report as a PR comment even for forks.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write   # post/update the sticky report comment

concurrency:
  group: quality-gate-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  gate:
    name: Compare base..head
    runs-on: ubuntu-latest
    # Only for successful CI runs that were themselves triggered by a pull request.
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    steps:
      # Check out the PR head that CI validated, with full history so the base
      # commit is reachable for `git diff` and `git worktree`.
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      # Match the toolchains the `test` job uses, plus Ruby, so the corpus sample
      # count and the per-language scan benchmarks are computed under the same
      # conditions on both revisions (an absent toolchain silently drops that
      # language's samples/benchmark).
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
      - uses: dtolnay/rust-toolchain@stable
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install benchstat
        run: |
          go install golang.org/x/perf/cmd/benchstat@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      # Resolve the PR number and base SHA. Same-repo PRs populate
      # workflow_run.pull_requests; otherwise fall back to the commit→PR API.
      - name: Resolve PR base
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            let pr = (run.pull_requests || [])[0];
            if (!pr) {
              const { data } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner: context.repo.owner, repo: context.repo.repo, commit_sha: run.head_sha,
              });
              pr = data.find(p => p.state === 'open') || data[0];
            }
            if (!pr) { core.setFailed('no PR associated with this CI run'); return; }
            const base = pr.base ? pr.base.sha : (await github.rest.pulls.get({
              owner: context.repo.owner, repo: context.repo.repo, pull_number: pr.number,
            })).data.base.sha;
            core.setOutput('number', String(pr.number));
            core.setOutput('base_sha', base);
            core.setOutput('head_sha', run.head_sha);

      - name: Run quality gate
        id: run
        run: |
          set +e
          # count>=10 so benchstat can compute a confidence interval (its floor is
          # 6) — the benchmark time+memory comparison is the gated signal.
          scripts/pr-quality-gate.sh "${{ steps.pr.outputs.base_sha }}" "${{ steps.pr.outputs.head_sha }}" \
            --bench-count 10 --output gate-report.md
          echo "exit=$?" >> "$GITHUB_OUTPUT"

      # (success || failure), NOT always(): a run cancelled by cancel-in-progress
      # (a newer push superseded it) must not overwrite a good report with the
      # "did not produce a report" fallback — the superseding run posts the real
      # one. always() would fire on cancellation too and cause that false alarm.
      - name: Post sticky comment
        if: (success() || failure()) && steps.pr.outputs.number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- godzilla-quality-gate -->';
            let body = marker + '\n';
            try { body += fs.readFileSync('gate-report.md', 'utf8'); }
            catch { body += '⚠️ The quality gate did not produce a report — see the workflow logs.'; }
            const issue = { owner: context.repo.owner, repo: context.repo.repo,
                            issue_number: Number('${{ steps.pr.outputs.number }}') };
            const { data: comments } = await github.rest.issues.listComments(issue);
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ ...issue, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ ...issue, body });
            }

      - name: Enforce gate
        # Same as above: a cancelled (superseded) run is not a gate failure.
        if: success() || failure()
        run: |
          if [ "${{ steps.run.outputs.exit }}" != "0" ]; then
            echo "::error::Quality gate failed — see the PR comment for the tripped hard gate(s)."
            exit 1
          fi
          echo "Quality gate passed."
