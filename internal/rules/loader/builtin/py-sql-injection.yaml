# SQL injection: untrusted request input flowing into a DB-API cursor/query
# execution without parameterization.
rules:
  - id: py-sql-injection
    languages: [python]
    severity: high
    cwe: CWE-89
    message: >-
      Untrusted input flows into a database query execution without
      parameterized arguments, which may allow SQL injection. Use
      parameterized queries (e.g. cursor.execute(sql, params)) instead of
      concatenating or formatting user input into the query string.
    sources:
      - "py:*request.args.get"
      - "py:*request.form.get"
      - "py:*request.values.get"
      - "py:*request.args.__getitem__"
      - "py:*request.form.__getitem__"
      - "py:*request.values.__getitem__"
    sinks:
      - "py:*.execute"
      - "py:*.executemany"
      - "py:*.executescript"
    # No built-in sanitizer neutralizes tainted input for raw SQL string
    # construction; the fix is parameterized queries, not escaping.
    sanitizers: []
    propagators:
      - "py:*.join"
