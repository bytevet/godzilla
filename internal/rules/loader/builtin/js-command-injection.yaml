# OS command injection: untrusted request input flowing into a shell command
# execution.
rules:
  - id: js-command-injection
    languages: [javascript]
    severity: critical
    cwe: CWE-78
    message: >-
      Untrusted request input (query string, route params, or body) flows
      into a shell command execution without sanitization, which may allow
      OS command injection. Avoid passing user-controlled data to a shell
      (child_process.exec/execSync/spawn with shell:true); use execFile or
      spawn with an argument array instead.
    sources:
      - "js:*req.query*"
      - "js:*req.params*"
      - "js:*req.body*"
    # A bare "js:*.exec" sink is deliberately NOT used: it matches
    # RegExp.prototype.exec (regex.exec(userInput)), an extremely common,
    # benign validation call, producing a critical false positive. child_process
    # is matched by its qualified name instead; execSync/spawn have no common
    # benign namesake, so a member match on those is safe.
    sinks:
      - "js:*child_process.exec*"
      - "js:*child_process.spawn*"
      - "js:*.execSync"
      - "js:*.execFileSync"
      - "js:*.spawn"
    sanitizers: []
    propagators: []
